@if (mainservice.loading()) {
  <div class="loader-wrapper">
    <div class="spinner"></div>
    <p>Loading...</p>
  </div>
} @else {
  <div class="restaurants">
    @for (food of mainservice.foods(); track food.id) {
      <div class="restaurant">
        <img [src]="food.image" [alt]="food.name" />

        <div class="bottom">
          <h2>{{ food.name | titlecase }}</h2>
          <p class="price">{{ food.price | currency }}</p>
          <button class="addbtn">Add Cart</button>
        </div>
      </div>
    }
  </div>
}
